name: krot-production

services:
  web:
    image: docker.io/hooodini/next-krot-image:latest
    entrypoint: ["/app/docker/entrypoint.sh"]
    command: ["node", "server.js"]

    env_file:
      - ${HOME}/env/next-krot-site/.env.production
      - ${HOME}/env/next-krot-site/.env.local

    environment:
      PG_HOST: db
      PG_PORT: 5432
      DATABASE_URL: "postgresql://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DB}?schema=public"
      PUBLIC_IMAGES_DIR: /app/storage/public-images

    expose:
      - "3000"

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - public-images:/app/storage/public-images

    networks:
      krot-internal:
        aliases:
          - krot-web

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    restart: unless-stopped

  db:
    image: postgres:18

    env_file:
      - ${HOME}/env/next-krot-site/.env.production
      - ${HOME}/env/next-krot-site/.env.local

    environment:
      POSTGRES_DB: ${PG_DB:-krot}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}

    ports:
      - "${PG_HOST_OUT:-127.0.0.1}:${PG_PORT_OUT:-6543}:5432"

    volumes:
      - postgres-data:/var/lib/postgresql

    networks:
      - krot-internal

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    restart: unless-stopped

  caddy:
    image: caddy:2.10.2-alpine

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"

    environment:
      ACME_AGREE: "true"

    env_file:
      - ${HOME}/env/next-krot-site/.env.production

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

    depends_on:
      web:
        condition: service_started

    networks:
      - krot-internal
      - caddy-public

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    restart: unless-stopped

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  public-images:

networks:
  krot-internal:
    internal: true

  caddy-public:
    external: true
